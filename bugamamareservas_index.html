<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bugamama Reservas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Reservas Bugamama</h2>

  <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">

    <input type="text" name="nombre" placeholder="Nombre completo" required>

    <input type="tel" name="telefono" placeholder="Teléfono" required>

    <input type="date" name="fecha" required>

    <textarea name="mensaje" placeholder="Detalles de la reserva"></textarea>

    <button type="submit">Enviar reserva</button>

  </form>
</div>

</body>
</html>
